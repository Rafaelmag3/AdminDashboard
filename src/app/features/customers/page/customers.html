<div class="flex flex-col gap-4">
    <div class="flex gap-1">
        <h1 class="text-gray-500">
            Total Customers:
        </h1>
        <p class="font-bold">
            {{ totalCustomers() }}
        </p>
    </div>
    <div class="flex gap-4">
        <button class="flex items-center gap-1 bg-blue-500 text-white px-4 py-2 rounded-md cursor-pointer">
            <span class="icon-[mi--add]"></span>
            Add Customer
        </button>
        <button class="flex items-center gap-1 bg-red-500 text-white px-4 py-2 rounded-md cursor-pointer">
            <span class="icon-[mi--delete]"></span>
            Delete Customers
        </button>
    </div>
    <div class="flex flex-col gap-4">
        <div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base ">
            <table class="w-full text-sm text-left rtl:text-right text-body">
                <thead class="text-sm text-heading bg-gray-200 border-b border-default-medium">
                    <tr>
                        <th scope="col" class="p-4">
                            <div class="flex items-center">
                                <input id="table-checkbox" type="checkbox" (click)="checkAllCustomers()" value=""
                                    class="w-4 h-4">
                                <label for="table-checkbox" class="sr-only">Table checkbox</label>
                            </div>
                        </th>
                        @for (head of headerCustomers; track $index) {
                        @if (head.showName) {
                        <th scope="col" class="px-6 py-3 font-medium uppercase">
                            {{ head.name }}
                        </th>
                        }
                        }
                    </tr>
                </thead>
                <tbody>
                    @for (customer of customers(); track customer.idCustomer) {
                    <tr class="bg-neutral-primary-soft border-b border-gray-200 hover:bg-gray-100">
                        <th scope="col" class="p-4">
                            <div class="flex items-center">
                                <input id="table-checkbox" type="checkbox" [value]="customer"
                                    [checked]="customer.checkbox" class="w-4 h-4">
                                <label for="table-checkbox" class="sr-only">Table checkbox</label>
                            </div>
                        </th>
                        <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap">
                            <div class="flex items-center gap-2">
                                <div
                                    class="bg-blue-100 text-blue-500 rounded-full p-2 flex items-center justify-center">
                                    <span class="icon-[carbon--customer-service]"></span>
                                </div>
                                <p>
                                    {{ customer.name }} {{customer.lastName}}
                                </p>
                            </div>
                        </th>
                        <td class="px-6 py-4">
                            {{ customer.email }}
                        </td>
                        <td class="px-6 py-4">
                            {{ customer.phoneNumber }}
                        </td>
                        <td class="flex items-center px-6 py-4">
                            <button class="font-medium text-fg-brand hover:underline">Edit</button>
                            <button class="font-medium text-danger hover:underline ms-3">Remove</button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
        <pagination [currentPage]="pagination().page" [totalPages]="pagination().totalPages"
            [total]="pagination().total" [limit]="pagination().limit" [hasNext]="pagination().hasNext"
            [hasPrev]="pagination().hasPrev" (pageChange)="onPageChange($event)" />
    </div>
</div>
