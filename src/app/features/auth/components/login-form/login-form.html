<div>
    <div class="p-1">
        <shared-alert [typeAlert]="typeAlert" [textAlert]="messageAlert()" [showAlert]="showAlert()"
            (alertClosed)="alertClosed()" />
    </div>
    <form class="p-1" (submit)="sendLoginRequest($event)">
        <div class="flex flex-col gap-5">
            <div class="input-group">
                <input type="text" placeholder=" " [formField]="loginForm.email"
                    [allowedChars]="formValidationConstants.EMAIL_ALLOWED_CHARS" />
                <label>Email</label>
                @if(loginForm.email().touched() && loginForm.email().invalid()){
                @for(error of loginForm.email().errors(); track error){
                <p class="text-red-500 text-sm pt-2">{{error.message}}</p>
                }
                }
            </div>
            <div class="input-group">
                <div class="relative">
                    <input [type]="passwordInputType()" placeholder=" " [formField]="loginForm.password"
                        [allowedChars]="formValidationConstants.PASSWORD_ALLOWED_CHARS" />
                    <label>Password</label>
                    <button type="button" class="btn--secondary btn-show" (click)="togglePasswordVisibility()">
                        <span [class]="passwordToggleIcon()"></span>
                    </button>
                </div>
                @if(loginForm.password().touched() && loginForm.password().invalid()){
                @for(error of loginForm.password().errors(); track error){
                <p class="text-red-500 text-sm pt-2">{{error.message}}</p>
                }
                }
            </div>
            <div>
                <button class="btn--primary w-full" type="submit">
                    Sign in
                </button>
            </div>
        </div>
    </form>
</div>
