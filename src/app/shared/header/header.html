<div class="flex flex-col md:flex-row justify-between gap-3">
    <div>
        <h1 class="text-3xl font-medium"> {{ currentNamePage() }} </h1>
    </div>
    <div>
        <div class="flex justify-between gap-3">
            <div class="w-auto cursor-pointer">
                <shared-card stylesCard="">
                    <span class="icon-[material-symbols--notifications-outline-sharp]"></span>
                </shared-card>
            </div>
            <div class=" cursor-pointer">
                <shared-card>
                    <div class="flex items-center gap-3">
                        <span class="icon-[gg--search]"></span>
                        <div class="flex-1">
                            <input type="text" id="search" class="w-auto" placeholder="Search anything">
                        </div>
                    </div>
                </shared-card>
            </div>
            <div class="cursor-pointer">
                <shared-card>
                    <img [src]="imageUser" [alt]="currentNamePage()" class="w-8 h-8 rounded-full">
                </shared-card>
            </div>
        </div>
    </div>
</div>
